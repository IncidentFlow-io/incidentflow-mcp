services:
  mcp:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - INCIDENTFLOW_PAT=${INCIDENTFLOW_PAT:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - REDIS_URL=${REDIS_URL:-redis://host.docker.internal:6379/0}
      - PLATFORM_API_BASE_URL=${MCP_PLATFORM_API_BASE_URL:-http://host.docker.internal:8000}
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redis:
    profiles:
      - local-deps
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis-dev-password}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis-dev-password}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data:/data
    restart: unless-stopped

  prometheus:
    profiles:
      - grafana-smoke
    image: prom/prometheus:v3.2.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  node-exporter:
    profiles:
      - grafana-smoke
    image: prom/node-exporter:v1.9.0
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    restart: unless-stopped

  grafana:
    profiles:
      - grafana-smoke
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_SERVICE_ACCOUNTS_ENABLED: "true"
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  grafana-dashboard-1860:
    profiles:
      - grafana-smoke
    image: curlimages/curl:8.12.1
    depends_on:
      grafana:
        condition: service_healthy
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GRAFANA_DASHBOARD_ID: "1860"
    command:
      - sh
      - -c
      - |
        set -eu
        curl -fsSL "https://grafana.com/api/dashboards/$${GRAFANA_DASHBOARD_ID}/revisions/latest/download" \
          -o /tmp/dashboard.json
        printf '{"dashboard":' > /tmp/import.json
        cat /tmp/dashboard.json >> /tmp/import.json
        printf ',"overwrite":true,"inputs":[{"name":"DS_PROMETHEUS","type":"datasource","pluginId":"prometheus","value":"Prometheus"}]}' >> /tmp/import.json
        curl -fsS \
          -u "$${GRAFANA_ADMIN_USER}:$${GRAFANA_ADMIN_PASSWORD}" \
          -H "Content-Type: application/json" \
          -X POST "$${GRAFANA_URL}/api/dashboards/import" \
          --data-binary @/tmp/import.json
        echo
        echo "Imported Grafana dashboard $${GRAFANA_DASHBOARD_ID}"
    restart: "no"

  grafana-sa-token:
    profiles:
      - grafana-smoke
    image: python:3.12-alpine
    depends_on:
      grafana:
        condition: service_healthy
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GRAFANA_SERVICE_ACCOUNT_NAME: ${GRAFANA_SERVICE_ACCOUNT_NAME:-incidentflow-platform}
      GRAFANA_SERVICE_ACCOUNT_TOKEN_NAME: ${GRAFANA_SERVICE_ACCOUNT_TOKEN_NAME:-incidentflow-platform-local}
      GRAFANA_SERVICE_ACCOUNT_ROLE: ${GRAFANA_SERVICE_ACCOUNT_ROLE:-Admin}
      GRAFANA_PORT: ${GRAFANA_PORT:-3000}
    volumes:
      - ./docker/grafana/scripts/create-service-account-token.py:/create-service-account-token.py:ro
    command: ["python", "/create-service-account-token.py"]
    restart: "no"

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
