<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IncidentFlow Grafana Panel</title>
    <style>
      :root {
        --bg: #fff;
        --fg: #172033;
        --muted: #607089;
        --border: #dbe3ef;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--fg);
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        min-width: 320px;
        min-height: 100%;
        padding: 16px;
      }

      .panel {
        width: 100%;
        min-height: 360px;
      }

      .panel-header {
        margin-bottom: 12px;
      }

      .panel-header h1 {
        margin: 0;
        color: var(--fg);
        font-size: 17px;
        line-height: 1.25;
      }

      #chart {
        width: 100%;
        min-height: 320px;
        border-top: 1px solid var(--border);
        padding-top: 12px;
      }

      .copy {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="shell">
        <section class="panel" aria-live="polite">
          <header class="panel-header">
            <h1>Loading Grafana panel...</h1>
          </header>
          <div id="chart">
            <p class="copy">Initializing IncidentFlow visualization.</p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
